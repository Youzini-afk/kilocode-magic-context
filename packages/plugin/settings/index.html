<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Magic Context</title>
    <style>
      :root {
        color-scheme: dark light;
        --bg: var(--vscode-editor-background, #1e1e1e);
        --panel: var(--vscode-sideBar-background, #252526);
        --panel-2: var(--vscode-input-background, #2b2b2b);
        --text: var(--vscode-foreground, #e8e8e8);
        --muted: var(--vscode-descriptionForeground, #a6a6a6);
        --border: var(--vscode-widget-border, #3f3f46);
        --accent: var(--vscode-button-background, #0e639c);
        --accent-text: var(--vscode-button-foreground, #fff);
        --danger: var(--vscode-errorForeground, #f87171);
        --warn: var(--vscode-editorWarning-foreground, #fbbf24);
        --ok: #4ade80;
        font-family: var(--vscode-font-family, system-ui, sans-serif);
        background: var(--bg);
        color: var(--text);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        border: 1px solid var(--border);
        background: var(--panel-2);
        color: var(--text);
        border-radius: 5px;
        padding: 7px 10px;
        cursor: pointer;
      }

      button:hover {
        border-color: var(--accent);
      }

      button.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: var(--accent-text);
      }

      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      input,
      select,
      textarea {
        width: 100%;
        min-width: 0;
        border: 1px solid var(--border);
        border-radius: 5px;
        background: var(--vscode-input-background, #1f1f1f);
        color: var(--vscode-input-foreground, var(--text));
        padding: 7px 9px;
      }

      textarea {
        min-height: 72px;
        resize: vertical;
        font-family: var(--vscode-editor-font-family, ui-monospace, monospace);
        font-size: 12px;
        line-height: 1.45;
      }

      .shell {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto auto 1fr;
        gap: 10px;
        padding: 10px 14px 14px;
      }

      .topbar {
        display: flex;
        gap: 10px;
        align-items: center;
        justify-content: space-between;
      }

      .title {
        min-width: 0;
      }

      h1 {
        margin: 0;
        font-size: 19px;
        font-weight: 650;
      }

      .hint,
      .path,
      .micro {
        color: var(--muted);
      }

      .actions {
        display: flex;
        gap: 7px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .status-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
      }

      .metric,
      .section,
      .notice {
        border: 1px solid var(--border);
        background: var(--panel);
        border-radius: 6px;
      }

      .metric {
        min-height: 72px;
        padding: 10px;
      }

      .metric-label {
        color: var(--muted);
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0;
      }

      .metric-value {
        margin-top: 7px;
        font-size: 13px;
        font-weight: 650;
        word-break: break-word;
      }

      .tabs {
        display: flex;
        gap: 4px;
        overflow-x: auto;
        border-bottom: 1px solid var(--border);
      }

      .tab {
        border: 0;
        border-bottom: 2px solid transparent;
        border-radius: 0;
        background: transparent;
        color: var(--muted);
        padding: 8px 10px;
        white-space: nowrap;
      }

      .tab.active {
        color: var(--text);
        border-bottom-color: var(--accent);
      }

      .content {
        display: grid;
        gap: 10px;
      }

      .section {
        overflow: hidden;
      }

      details.section summary {
        list-style: none;
        cursor: pointer;
      }

      details.section summary::-webkit-details-marker {
        display: none;
      }

      details.section:not([open]) .section-head {
        border-bottom: 0;
      }

      .chevron {
        color: var(--muted);
        font-size: 12px;
        margin-top: 2px;
      }

      details[open] .chevron {
        transform: rotate(90deg);
      }

      .preset {
        display: grid;
        gap: 8px;
        padding: 12px;
      }

      .preset-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .preset-card {
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--panel-2);
        padding: 10px;
        text-align: left;
      }

      .preset-card.active {
        border-color: var(--accent);
        box-shadow: inset 0 0 0 1px var(--accent);
      }

      .section-head {
        display: flex;
        gap: 10px;
        justify-content: space-between;
        align-items: flex-start;
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
      }

      .section-title {
        font-size: 13px;
        font-weight: 650;
      }

      .section-desc {
        margin-top: 2px;
        color: var(--muted);
        font-size: 12px;
      }

      .rows {
        display: grid;
      }

      .row {
        display: grid;
        grid-template-columns: minmax(180px, 0.8fr) minmax(240px, 1fr);
        gap: 12px;
        align-items: start;
        padding: 10px 12px;
        border-top: 1px solid color-mix(in srgb, var(--border), transparent 35%);
      }

      .row:first-child {
        border-top: 0;
      }

      .label {
        display: flex;
        gap: 6px;
        align-items: center;
        min-width: 0;
        font-size: 12px;
        font-weight: 620;
      }

      .key {
        color: var(--muted);
        font-family: var(--vscode-editor-font-family, ui-monospace, monospace);
        font-size: 11px;
        word-break: break-word;
      }

      .hint {
        margin-top: 4px;
        font-size: 11px;
        line-height: 1.35;
      }

      .control-line {
        display: flex;
        gap: 7px;
        align-items: center;
      }

      .control-line input[type="checkbox"] {
        width: 16px;
        height: 16px;
      }

      .control-line .grow {
        flex: 1;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        min-height: 20px;
        border: 1px solid var(--border);
        border-radius: 5px;
        padding: 2px 6px;
        color: var(--muted);
        font-size: 11px;
      }

      .pill.ok {
        color: var(--ok);
        border-color: color-mix(in srgb, var(--ok), transparent 50%);
      }

      .pill.warn {
        color: var(--warn);
        border-color: color-mix(in srgb, var(--warn), transparent 50%);
      }

      .notice {
        padding: 10px 12px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
      }

      .notice.error {
        color: var(--danger);
        border-color: color-mix(in srgb, var(--danger), transparent 45%);
      }

      .split {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .raw-editor {
        min-height: 420px;
      }

      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-family: var(--vscode-editor-font-family, ui-monospace, monospace);
        font-size: 12px;
        line-height: 1.45;
      }

      .path {
        font-size: 11px;
        word-break: break-word;
      }

      @media (max-width: 780px) {
        .topbar {
          align-items: stretch;
          flex-direction: column;
        }

        .status-grid,
        .split {
          grid-template-columns: 1fr;
        }

        .row {
          grid-template-columns: 1fr;
        }

        .actions {
          justify-content: flex-start;
        }
      }
    </style>
  </head>

      function rpc(method, params) {
        const requestId = `${Date.now()}-${++state.requestSeq}`;
        parent.postMessage({ type: "pluginSettingsRpc", pluginId, requestId, method, params }, "*");
        return new Promise((resolve, reject) => {
          state.pending.set(requestId, { resolve, reject });
          setTimeout(() => {
            const hit = state.pending.get(requestId);
            if (!hit) return;
            state.pending.delete(requestId);
            reject(new Error("RPC timed out"));
          }, 20000);
        });
      }

      window.addEventListener("message", (event) => {
        const msg = event.data;
        if (!msg || msg.type !== "pluginSettingsRpcResult" || msg.pluginId !== pluginId) return;
        const hit = state.pending.get(msg.requestId);
        if (!hit) return;
        state.pending.delete(msg.requestId);
        if (msg.error) hit.reject(new Error(msg.error));
        else hit.resolve(msg.result);
      });

      const app = document.getElementById("app");
      const esc = (value) =>
        String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      const clone = (value) => JSON.parse(JSON.stringify(value ?? {}));
      const isObject = (value) => value && typeof value === "object" && !Array.isArray(value);

      function getPath(obj, path) {
        return path.split(".").reduce((current, key) => (current == null ? undefined : current[key]), obj);
      }

      function setPath(path, value) {
        const next = clone(state.draft);
        const keys = path.split(".");
        let current = next;
        for (let i = 0; i < keys.length - 1; i++) {
          const key = keys[i];
          if (!isObject(current[key])) current[key] = {};
          current = current[key];
        }
        const finalKey = keys[keys.length - 1];
        if (value === undefined || value === "") delete current[finalKey];
        else current[finalKey] = value;
        state.draft = next;
        state.rawText = JSON.stringify(state.draft, null, 2);
        state.dirty = true;
      }

      function resetPath(path) {
        setPath(path, undefined);
        render();
      }

      function applyPreset(id) {
        state.preset = id;
        const next = clone(state.draft);
        if (id === "recommended") {
          next.enabled = true;

          next.memory = { ...(next.memory ?? {}), enabled: true, auto_promote: true };
          next.compressor = { ...(next.compressor ?? {}), enabled: true };

        if (id === "minimal") {
          next.enabled = true;
          next.ctx_reduce_enabled = true;
          next.memory = { ...(next.memory ?? {}), enabled: true, auto_promote: false };
          next.compressor = { ...(next.compressor ?? {}), enabled: false };

          next.sidekick = { ...(next.sidekick ?? {}), enabled: false };

        state.draft = next;
        state.rawText = JSON.stringify(state.draft, null, 2);
        state.dirty = true;
        render();

      function parseLooseJson(value) {
        const text = value.trim();
        if (!text) return undefined;
        try {
          return JSON.parse(text);
        } catch {
          return text;
        }
      }

      function parseLines(value) {
        const entries = value
          .split(/\r?\n/)
          .map((line) => line.trim())
          .filter(Boolean);
        return entries.length ? entries : undefined;
      }

      function parseKeyValueMap(value, valueKind) {
        const entries = value
          .split(/\r?\n/)
          .map((line) => line.trim())
          .filter(Boolean);
        if (!entries.length) return undefined;
        const output = {};
        for (const entry of entries) {
          const separator = entry.indexOf("=");
          if (separator <= 0) throw new Error(`Use key=value format: ${entry}`);
          const key = entry.slice(0, separator).trim();
          const raw = entry.slice(separator + 1).trim();
          if (!key) throw new Error(`Missing key: ${entry}`);
          if (valueKind === "number") {
            const numeric = Number(raw);
            if (!Number.isFinite(numeric)) throw new Error(`Expected a number for ${key}`);
            output[key] = numeric;
          } else if (valueKind === "bool") {
            if (!["true", "false"].includes(raw.toLowerCase())) throw new Error(`Expected true or false for ${key}`);
            output[key] = raw.toLowerCase() === "true";
          } else {
            output[key] = raw;
          }
        }
        return output;
      }

      function keyValueValue(path) {
        const value = getPath(state.draft, path);
        if (value === undefined) return "";
        if (!isObject(value)) return `default=${String(value)}`;
        return Object.entries(value)
          .filter(([, item]) => item !== undefined)
          .map(([key, item]) => `${key}=${String(item)}`)
          .join("\n");
      }

      function jsonValue(path) {
        const value = getPath(state.draft, path);
        if (value === undefined) return "";
        return typeof value === "string" ? value : JSON.stringify(value, null, 2);
      }

      function linesValue(path) {
        const value = getPath(state.draft, path);
        if (Array.isArray(value)) return value.join("\n");
        if (typeof value === "string") return value;
        return "";
      }

        return row(

            number("Caveman min chars", "experimental.caveman_text_compression.min_chars", "Minimum text length for caveman compression.", "600"),
          ]),
        ].join("");
      }

      function renderTab() {
        if (state.loading) return `<div class="notice">${esc(t("loading"))}</div>`;
        const modelStatus = state.activeTab === "agents" && state.modelStatus ? `<div class="notice">${esc(state.modelStatus)}</div>` : "";
        if (state.activeTab === "overview") return renderOverview();
        if (state.activeTab === "core") return renderCore();
        if (state.activeTab === "agents") return modelStatus + renderAgents();
        if (state.activeTab === "memory") return renderMemory();
        if (state.activeTab === "advanced") return renderAdvanced();
        return renderOverview();
      }

      function render() {
        app.innerHTML = `
          <div class="topbar">
            <div class="title">
              <h1>${esc(t("title"))}</h1>
            </div>
            <div class="actions">
              <button data-action="refresh">${esc(t("refresh"))}</button>
              <button data-action="doctor">${esc(t("doctor"))}</button>
              <button data-action="discard" ${!state.dirty ? "disabled" : ""}>${esc(t("discard"))}</button>
              <button class="primary" data-action="save" ${state.saving || !state.dirty ? "disabled" : ""}>${esc(state.saving ? t("saving") : t("save"))}</button>
            </div>
          </div>
          <div class="tabs">
            ${tabs
              .map((tab) => `<button class="tab ${state.activeTab === tab ? "active" : ""}" data-tab="${tab}">${esc(t(tabLabels[tab]))}</button>`)
              .join("")}
          </div>
          <main class="content">${renderTab()}</main>
        `;
      }

      async function refresh() {
        state.loading = true;
        state.error = "";
        render();
        try {
          const [status, config, models] = await Promise.all([
            rpc("status"),
            rpc("config.read"),
            rpc("kilo.models"),
          ]);
          state.status = status;
          state.configPayload = config;
          state.modelOptions = Array.isArray(models?.models) ? models.models : [];
          state.modelStatus = state.modelOptions.length
            ? `Loaded ${state.modelOptions.length} configured Kilo models.`
            : "No configured Kilo provider models were returned. Configure a provider in Kilo, then refresh this panel.";
          state.draft = clone(config.raw ?? {});
          state.rawText = JSON.stringify(state.draft, null, 2);
          state.dirty = false;
          state.notice = "";
        } catch (error) {
          state.error = error instanceof Error ? error.message : String(error);
        } finally {
          state.loading = false;
          render();
        }
      }

      async function runDoctor() {
        try {
          state.doctor = await rpc("doctor");
          state.notice = t("doctorFinished");
          state.activeTab = "overview";
        } catch (error) {
          state.error = error instanceof Error ? error.message : String(error);
        }
        render();
      }

      async function save() {
        if (!state.dirty || state.saving) return;
        state.saving = true;
        state.error = "";
        render();
        try {
          const saved = await rpc("config.save", {
            expectedMtimeMs: state.configPayload?.target?.mtimeMs ?? null,
            config: state.draft,
          });
          state.configPayload = saved;
          state.draft = clone(saved.raw ?? {});
          state.rawText = JSON.stringify(state.draft, null, 2);
          state.dirty = false;
          state.notice = t("savedNotice");
        } catch (error) {
          state.error = error instanceof Error ? error.message : String(error);
        } finally {
          state.saving = false;
          render();
        }
      }

      function discard() {
        state.draft = clone(state.configPayload?.raw ?? {});
        state.rawText = JSON.stringify(state.draft, null, 2);
        state.dirty = false;
        state.error = "";
        render();
      }

      app.addEventListener("click", (event) => {
        const tab = event.target.closest("[data-tab]")?.getAttribute("data-tab");
        if (tab) {
          state.activeTab = tab;
          render();
          return;
        }
        const reset = event.target.closest("[data-reset]")?.getAttribute("data-reset");
        if (reset) {
          resetPath(reset);
          return;
        }
        const preset = event.target.closest("[data-preset]")?.getAttribute("data-preset");
        if (preset) {
          applyPreset(preset);
          return;
        }
        const action = event.target.closest("[data-action]")?.getAttribute("data-action");
        if (action === "refresh") refresh();
        if (action === "doctor") runDoctor();
        if (action === "save") save();
        if (action === "discard") discard();
      });

      app.addEventListener("input", (event) => {
        const target = event.target.closest("[data-path]");
        if (!target) return;
        const path = target.getAttribute("data-path");
        const kind = target.getAttribute("data-kind");
        if (!path) return;
        try {
          if (kind === "bool") setPath(path, target.checked);
          else if (kind === "number") setPath(path, target.value.trim() ? Number(target.value) : undefined);
          else if (kind === "json") setPath(path, parseLooseJson(target.value));
          else if (kind?.startsWith("keyvalue:")) setPath(path, parseKeyValueMap(target.value, kind.slice("keyvalue:".length)));
          else if (kind === "lines") setPath(path, parseLines(target.value));
          else setPath(path, target.value.trim() || undefined);
          state.error = "";
        } catch (error) {
          state.error = error instanceof Error ? error.message : String(error);
        }
      });

      refresh();
    </script>
  </body>
</html>
