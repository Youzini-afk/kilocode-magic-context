<!doctype html>
<html lang="en" data-theme="kilo-plugin">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Magic Context</title>
    <style>
      :root {
        color-scheme: dark light;
        font-family: var(--vscode-font-family, system-ui, sans-serif);
        background: var(--vscode-editor-background, #111);
        color: var(--vscode-foreground, #eee);
      }
      body {
        margin: 0;
        padding: 16px;
      }
      .shell {
        display: grid;
        gap: 12px;
      }
      .toolbar {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }
      button {
        border: 1px solid var(--vscode-button-border, transparent);
        background: var(--vscode-button-background, #0e639c);
        color: var(--vscode-button-foreground, #fff);
        border-radius: 4px;
        padding: 6px 10px;
        cursor: pointer;
      }
      button.secondary {
        background: var(--vscode-button-secondaryBackground, transparent);
        color: var(--vscode-button-secondaryForeground, currentColor);
        border-color: var(--vscode-widget-border, #444);
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 8px;
      }
      .panel {
        border: 1px solid var(--vscode-widget-border, #444);
        border-radius: 6px;
        padding: 12px;
        background: var(--vscode-sideBar-background, rgba(255, 255, 255, 0.03));
      }
      .label {
        font-size: 11px;
        color: var(--vscode-descriptionForeground, #999);
        text-transform: uppercase;
      }
      .value {
        margin-top: 4px;
        font-size: 14px;
        word-break: break-word;
      }
      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-family: var(--vscode-editor-font-family, ui-monospace, monospace);
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="toolbar">
        <button id="refresh">Refresh</button>
        <button id="doctor" class="secondary">Doctor</button>
      </div>
      <div class="grid">
        <div class="panel">
          <div class="label">Enabled</div>
          <div class="value" id="enabled">...</div>
        </div>
        <div class="panel">
          <div class="label">Storage</div>
          <div class="value" id="storage">...</div>
        </div>
        <div class="panel">
          <div class="label">Config</div>
          <div class="value" id="config">...</div>
        </div>
      </div>
      <div class="panel">
        <div class="label">Details</div>
        <pre id="details">Loading Magic Context status...</pre>
      </div>
    </div>
    <script type="module">
      const pluginId = "kilocode-magic-context";
      let seq = 0;
      const pending = new Map();

      function rpc(method, params) {
        const requestId = `${Date.now()}-${++seq}`;
        parent.postMessage({ type: "pluginSettingsRpc", pluginId, requestId, method, params }, "*");
        return new Promise((resolve, reject) => {
          pending.set(requestId, { resolve, reject });
          setTimeout(() => {
            if (!pending.has(requestId)) return;
            pending.delete(requestId);
            reject(new Error("RPC timed out"));
          }, 15000);
        });
      }

      window.addEventListener("message", (event) => {
        const msg = event.data;
        if (!msg || msg.type !== "pluginSettingsRpcResult") return;
        if (msg.pluginId !== pluginId) return;
        const hit = pending.get(msg.requestId);
        if (!hit) return;
        pending.delete(msg.requestId);
        if (msg.error) hit.reject(new Error(msg.error));
        else hit.resolve(msg.result);
      });

      function text(id, value) {
        document.getElementById(id).textContent = value == null ? "..." : String(value);
      }

      async function refresh() {
        text("details", "Loading Magic Context status...");
        try {
          const status = await rpc("status");
          text("enabled", status?.enabled);
          text("storage", status?.storageDir);
          text("config", status?.configFile ?? "defaults");
          text("details", JSON.stringify(status, null, 2));
        } catch (error) {
          text("details", error instanceof Error ? error.message : String(error));
        }
      }

      async function doctor() {
        text("details", "Running doctor...");
        try {
          const status = await rpc("doctor");
          text("details", JSON.stringify(status, null, 2));
        } catch (error) {
          text("details", error instanceof Error ? error.message : String(error));
        }
      }

      document.getElementById("refresh").addEventListener("click", refresh);
      document.getElementById("doctor").addEventListener("click", doctor);
      refresh();
    </script>
  </body>
</html>
