# Kilo Docker E2E is intentionally manual until the legacy OpenCode/Pi
# containers under tests/docker are ported to Kilo.

name: E2E (Docker)

on:
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-artifacts:
    name: Build release artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run build

      - name: Pack release artifacts
        run: bun run pack:release
