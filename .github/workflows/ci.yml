name: CI

on:
  push:
    branches: [master, main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: TypeScript typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Kilo path unit test
        run: bun test packages/plugin/src/shared/data-path.test.ts

      - name: CLI setup smoke test
        env:
          KILO_TEST_HOME: ${{ runner.temp }}/kilo-home
          KILO_CONFIG_DIR: ${{ runner.temp }}/kilo-config
        run: |
          bun packages/cli/src/index.ts setup --plugin "$GITHUB_WORKSPACE/packages/plugin"
          bun packages/cli/src/index.ts doctor
